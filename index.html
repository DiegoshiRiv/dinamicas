<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json?v=7" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0661C6" />
    <meta name="application-name" content="POGOGDL" />
    <meta name="apple-mobile-web-app-title" content="POGOGDL" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>POGOGDL</title>
    <style>
      html, body { margin: 0; background: #e8f4fc; }
      #boot-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #e8f4fc; z-index: 9999; font-family: system-ui, -apple-system, sans-serif;
        color: #0d3b66; pointer-events: none;
      }
      #boot-splash.is-hidden { display: none !important; }
      #boot-splash .card { text-align: center; padding: 1.25rem 1.5rem; }
      #boot-splash .spin {
        width: 28px; height: 28px; margin: 0 auto 12px;
        border: 3px solid rgba(13,59,102,.2); border-top-color: #0661C6;
        border-radius: 50%; animation: boot-spin .7s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite">
      <div class="card">
        <div class="spin" aria-hidden="true"></div>
        <div style="font-weight:800;font-size:15px">POGOGDL</div>
        <div style="font-size:12px;opacity:.75;margin-top:4px">Cargando…</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        function hideBootSplash() {
          var splash = document.getElementById('boot-splash')
          if (splash) splash.classList.add('is-hidden')
        }
        window.__hideBootSplash = hideBootSplash

        // Si el JS de la app falla o tarda, nunca dejar pantalla eterna.
        window.setTimeout(hideBootSplash, 4000)

        // Cuando React pinte #root, quitar splash al instante.
        var root = document.getElementById('root')
        if (root && typeof MutationObserver !== 'undefined') {
          var obs = new MutationObserver(function () {
            if (root.childNodes.length > 0) {
              hideBootSplash()
              obs.disconnect()
            }
          })
          obs.observe(root, { childList: true })
        }

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js?v=7').catch(function () {})
          })
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
